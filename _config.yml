# ================================
# 网站基本信息（这些是核心，必须填）
# ================================

theme: jekyll-theme-chirpy
lang: en
timezone: Asia/Shanghai

title: Zoo Mesh & Aviary Netting Expert | Animal Enclosure Solutions Blog
tagline: 30+ Years Industry Experience
description: >-
  Professional insights on zoo mesh, aviary netting, and animal enclosure mesh.
  Technical guides, material comparisons, and case studies for architects,
  zoo planners, and contractors.

url: "https://hebmetalmesh.github.io"
baseurl: ""

# ================================
# GitHub 信息
# ================================

github:
  username: hebmetalmesh

# ================================
# 社交链接（只保留主站）
# ================================

social:
  name: Hebmetalmesh
  email: hebmetalmesh@gmail.com
  links:
    - https://hebmetalmesh.com

# ================================
# 搜索引擎验证（全部留空）
# ================================

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ================================
# 统计代码（全部留空，不需要）
# ================================

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

# ================================
# 界面设置
# ================================

theme_mode:
avatar: "/assets/img/logo.png"
social_preview_image:
cdn:
toc: true
paginate: 10

# ================================
# 评论系统（不需要，全部留空）
# ================================

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

# ================================
# PWA 离线功能（不需要，注释掉）
# ================================

# pwa:
#   enabled: true
#   cache:
#     enabled: true
#     deny_paths:

# ================================
# 编辑文章功能（不需要）
# ================================

actions:
  edit_post:
    enabled: false
    url: ""
    static_url: false

# ================================
# 以下配置保持不动（Jekyll 底层构建）
# ================================

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
